name: ff_sensitivity_ai
description: FF Sensitivity AI - Smart sensitivity recommendations for Free Fire
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Core
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  
  # Device Info
  device_info_plus: ^11.0.0
  battery_plus: ^4.0.0
  permission_handler: ^11.0.0
  
  # Image & File
  image_picker: ^1.0.0
  image: ^4.0.0
  
  # Sharing & URLs
  url_launcher: ^6.1.0
  share_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/icon.png